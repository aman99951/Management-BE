<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0; padding:0; background-color:#1a1a1e; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table cellpadding="0" cellspacing="0" width="100%" style="background-color:#1a1a1e; padding:40px 20px;">
    <tr>
      <td align="center">
        <table cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background-color:#252529; border-radius:16px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.4);">

          {# ── Header ── #}
          <tr>
            <td style="background:linear-gradient(135deg, #b8860b 0%, #d4a017 100%); padding:32px 40px; text-align:center;">
              <h1 style="margin:0; color:#fff; font-size:24px; font-weight:700;">{% block header_title %}Management Tool{% endblock %}</h1>
              {% block header_subtitle %}{% endblock %}
            </td>
          </tr>

          {# ── Body ── #}
          <tr>
            <td style="padding:32px 40px;">
              {% block body %}{% endblock %}
            </td>
          </tr>

          {# ── Footer ── #}
          <tr>
            <td style="padding:20px 40px; border-top:1px solid #333; text-align:center;">
              <p style="margin:0; color:#888; font-size:12px;">
                Management Tool · <a href="{{ frontend_url }}" style="color:#d4a017; text-decoration:none;">View on Dashboard</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
